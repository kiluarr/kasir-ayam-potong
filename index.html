<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kasir Ayam Potong</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#26241F">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasir Ayam">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{
    --ink:#26241F; --red:#B4362A; --yellow:#E2A33C;
    --paper:#FAF8F2; --paper-dim:#F1EDE2; --green:#3F6B4A; --line:#D6D0BF; --muted:#6B6558;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0; padding:0; background:var(--paper); color:var(--ink);
    font-family:system-ui,-apple-system,sans-serif;
  }
  .mono{font-family:'Courier New',monospace;}
  .wrap{max-width:480px; margin:0 auto; background:var(--paper);}
  @media (min-width:480px){
    html, body{ background:var(--paper-dim); }
    .wrap{ min-height:100vh; box-shadow:0 0 30px rgba(0,0,0,0.08); }
  }

  .header{background:var(--ink); color:var(--paper); padding:24px 20px 18px;}
  .header .eyebrow{font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--yellow); font-family:'Courier New',monospace;}
  .header h1{font-size:22px; margin:6px 0 0; font-weight:700;}
  .header .omzet-row{display:flex; justify-content:space-between; align-items:baseline; margin-top:14px; padding-top:12px; border-top:1px dashed rgba(250,248,242,0.25);}
  .header .omzet-label{font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-family:'Courier New',monospace;}
  .header .omzet-value{font-size:20px; font-weight:700; color:var(--yellow); font-family:'Courier New',monospace;}

  section{padding:20px; border-bottom:1px solid var(--line);}
  .sec-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin:0 0 12px; font-family:'Courier New',monospace;}

  label{display:block; font-size:12px; font-weight:600; margin-bottom:4px;}
  select, input[type=number], input[type=text]{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:4px;
    font-size:14px; background:#fff; color:var(--ink);
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;}
  .subtotal-row{display:flex; justify-content:space-between; padding:12px 2px; font-size:13px;}
  .subtotal-row .val{font-weight:700; font-family:'Courier New',monospace;}

  button{cursor:pointer; border:none; font-family:inherit;}
  .btn-primary{
    width:100%; padding:13px; background:var(--red); color:var(--paper);
    font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.04em; border-radius:4px;
  }
  .btn-outline{
    width:100%; padding:13px; background:transparent; color:var(--ink); border:2px solid var(--ink);
    font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.04em; border-radius:4px;
  }
  .btn-yellow{
    width:100%; padding:11px; background:var(--yellow); color:var(--ink);
    font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.04em; border-radius:4px;
  }
  .btn-yellow:disabled{opacity:0.4; cursor:not-allowed;}

  .tx-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dotted var(--line);}
  .tx-item:last-child{border-bottom:none;}
  .tx-item .jenis{font-weight:600; font-size:14px;}
  .tx-item .meta{font-size:11px; color:var(--muted); font-family:'Courier New',monospace; margin-top:2px;}
  .tx-item .right{display:flex; align-items:center; gap:10px;}
  .tx-item .total{font-weight:700; font-family:'Courier New',monospace; font-size:14px;}
  .del-btn{background:none; color:#B5AFA0; font-size:16px; padding:4px;}
  .empty{font-size:13px; color:var(--muted); font-style:italic;}

  .toggle-row{display:flex; justify-content:space-between; align-items:center; width:100%; background:none; color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; font-family:'Courier New',monospace; padding:0;}
  .panel{margin-top:14px; padding:14px; background:var(--paper-dim); border-radius:4px;}
  .panel .r{display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;}
  .panel .r .v{font-weight:700; font-family:'Courier New',monospace;}
  .panel .breakdown{margin:10px 0; padding-top:8px; border-top:1px dashed var(--line);}
  .panel .breakdown div{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); padding:3px 0;}

  .hist-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dotted var(--line);}
  .hist-item:last-child{border-bottom:none;}
  .hist-item .dl{background:var(--paper-dim); border-radius:4px; padding:8px; font-size:16px;}

  .price-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .price-row input[type=text]{flex:1;}
  .price-row input[type=number]{width:110px; font-family:'Courier New',monospace;}
  .add-price{background:none; color:var(--red); font-size:12px; font-weight:700; padding:4px 0;}

  footer{padding:14px 20px calc(14px + env(safe-area-inset-bottom)); text-align:center; background:var(--paper-dim); font-size:11px; color:var(--muted); font-family:'Courier New',monospace;}

  .struk-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
    align-items:flex-start; justify-content:center; overflow-y:auto; z-index:1000; padding:24px 12px;
  }
  .struk-sheet{
    background:#fff; color:#1a1a1a; width:100%; max-width:340px; margin:auto;
    padding:20px; border-radius:6px; font-family:'Courier New', monospace;
  }
  .struk-sheet .center{ text-align:center; }
  .struk-sheet h1{ font-size:16px; margin:0 0 2px; letter-spacing:0.03em; }
  .struk-sheet .sub{ font-size:11px; margin:0 0 10px; text-transform:capitalize; }
  .struk-sheet .dashed{ border-top:1px dashed #1a1a1a; margin:10px 0; }
  .struk-sheet table{ width:100%; border-collapse:collapse; font-size:12px; }
  .struk-sheet td{ padding:3px 0; vertical-align:top; }
  .struk-sheet .c-jenis{ text-align:left; }
  .struk-sheet .c-jml{ text-align:center; width:36px; }
  .struk-sheet .c-jam{ text-align:left; width:52px; color:#555; }
  .struk-sheet .c-total{ text-align:right; }
  .struk-sheet th{ font-size:11px; text-align:left; padding:3px 0; border-bottom:1px solid #1a1a1a; }
  .struk-sheet .th-jml{ text-align:center; }
  .struk-sheet .th-total{ text-align:right; }
  .struk-sheet .detail-row td{ font-size:11px; color:#333; }
  .struk-sheet .total-row td{ font-weight:bold; font-size:13px; padding-top:6px; }
  .struk-sheet .footer{ font-size:11px; margin-top:14px; }
  .struk-actions{ margin-top:18px; display:flex; flex-direction:column; gap:8px; }
  .struk-actions button{
    width:100%; padding:12px; font-family:inherit; font-weight:bold; font-size:13px;
    border:none; border-radius:4px; cursor:pointer; text-transform:uppercase; letter-spacing:0.04em;
  }
  .struk-actions button:not(.close){ background:var(--red); color:#fff; }
  .struk-actions button.close{ background:var(--paper-dim); color:var(--ink); }

  @media print{
    body *{ visibility:hidden; }
    .struk-overlay, .struk-overlay *{ visibility:visible; }
    .struk-overlay{ position:absolute; inset:0; background:#fff; padding:0; display:block !important; }
    .struk-sheet{ box-shadow:none; max-width:100%; margin:0; }
    .no-print{ display:none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <p class="eyebrow">Kasir Ayam Potong</p>
    <h1 id="todayLabel"></h1>
    <div class="omzet-row">
      <span class="omzet-label">Omzet Hari Ini</span>
      <span class="omzet-value" id="todayTotal">Rp 0</span>
    </div>
  </div>

  <!-- form input -->
  <section>
    <p class="sec-title">Tambah Transaksi</p>
    <label for="jenisSelect">Jenis Ayam</label>
    <select id="jenisSelect"></select>
    <div class="row2">
      <div>
        <label for="jumlahInput">Jumlah (Ekor)</label>
        <input type="number" id="jumlahInput" min="1" value="1">
      </div>
      <div>
        <label for="hargaInput">Harga / Ekor</label>
        <input type="number" id="hargaInput" min="0" step="1000">
      </div>
    </div>
    <div class="subtotal-row">
      <span>Subtotal</span>
      <span class="val" id="subtotalVal">Rp 0</span>
    </div>
    <button class="btn-primary" id="addBtn">+ Tambah ke Struk</button>
  </section>

  <!-- transaksi hari ini -->
  <section>
    <p class="sec-title" id="txCountLabel">Transaksi Hari Ini (0)</p>
    <div id="txList"><p class="empty">Belum ada transaksi. Tambahkan di atas.</p></div>
  </section>

  <!-- tutup kasir -->
  <section>
    <button class="btn-outline" id="closingBtn">🔒 Tutup Kasir Hari Ini</button>
    <div class="panel" id="closingPanel" style="display:none;">
      <p class="sec-title" style="color:var(--green); margin-bottom:10px;" id="closingDate"></p>
      <div class="r"><span>Jumlah Transaksi</span><span class="v" id="cJumlahTx">0</span></div>
      <div class="r"><span>Total Ekor Terjual</span><span class="v" id="cEkor">0</span></div>
      <div class="r"><span>Total Omzet</span><span class="v" id="cOmzet" style="color:var(--red);">Rp 0</span></div>
      <div class="breakdown" id="cBreakdown"></div>
      <button class="btn-yellow" id="downloadTodayBtn">🧾 Lihat / Download Struk</button>
    </div>
  </section>

  <!-- riwayat -->
  <section>
    <button class="toggle-row" id="historyToggle"><span id="historyLabel">Riwayat Hari Sebelumnya (0)</span><span id="historyArrow">▾</span></button>
    <div id="historyPanel" style="display:none; margin-top:12px;"></div>
  </section>

  <!-- pengaturan harga -->
  <section style="border-bottom:none;">
    <button class="toggle-row" id="settingsToggle"><span>⚙ Daftar Harga</span><span id="settingsArrow">▾</span></button>
    <div id="settingsPanel" style="display:none; margin-top:12px;">
      <div id="priceRows"></div>
      <button class="add-price" id="addPriceBtn">+ Tambah Jenis Ayam</button>
    </div>
  </section>

  <footer>Data tersimpan otomatis di browser HP ini</footer>
</div>

<div id="strukOverlay" class="struk-overlay">
  <div class="struk-sheet">
    <div id="strukBody"></div>
    <div class="struk-actions no-print">
      <button id="strukPrintBtn">🖨 Print / Simpan sebagai PDF</button>
      <button id="strukCloseBtn" class="close">Tutup</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'kasir-ayam-potong-data';

  const DEFAULT_PRICES = [
    { id: 'p1', jenis: 'Ayam Broiler', harga: 42000 },
    { id: 'p2', jenis: 'Ayam Kampung', harga: 75000 },
    { id: 'p3', jenis: 'Ayam Pejantan', harga: 60000 },
    { id: 'p4', jenis: 'Ayam Potong Super', harga: 48000 },
  ];

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        return {
          priceList: parsed.priceList && parsed.priceList.length ? parsed.priceList : DEFAULT_PRICES,
          transactions: parsed.transactions || []
        };
      }
    }catch(e){ console.error('Gagal memuat data', e); }
    return { priceList: DEFAULT_PRICES, transactions: [] };
  }

  function saveData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ priceList: state.priceList, transactions: state.transactions }));
    }catch(e){ console.error('Gagal menyimpan data', e); }
  }

  let state = loadData();

  function todayStr(){
    const d = new Date();
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off*60000);
    return local.toISOString().slice(0,10);
  }

  function formatRp(n){
    return 'Rp ' + Math.round(Number(n)||0).toLocaleString('id-ID');
  }

  function formatTanggalIndo(iso){
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  const TODAY = todayStr();
  document.getElementById('todayLabel').textContent = formatTanggalIndo(TODAY);

  const jenisSelect = document.getElementById('jenisSelect');
  const hargaInput = document.getElementById('hargaInput');
  const jumlahInput = document.getElementById('jumlahInput');
  const subtotalVal = document.getElementById('subtotalVal');

  function renderJenisSelect(){
    jenisSelect.innerHTML = state.priceList.map(p => `<option value="${p.id}">${p.jenis}</option>`).join('');
    if(state.priceList.length){
      hargaInput.value = state.priceList[0].harga;
    }
  }

  jenisSelect.addEventListener('change', () => {
    const p = state.priceList.find(x => x.id === jenisSelect.value);
    if(p) hargaInput.value = p.harga;
    updateSubtotal();
  });

  function updateSubtotal(){
    const total = (Number(jumlahInput.value)||0) * (Number(hargaInput.value)||0);
    subtotalVal.textContent = formatRp(total);
  }
  jumlahInput.addEventListener('input', updateSubtotal);
  hargaInput.addEventListener('input', updateSubtotal);

  document.getElementById('addBtn').addEventListener('click', () => {
    const p = state.priceList.find(x => x.id === jenisSelect.value);
    const jumlah = Number(jumlahInput.value);
    const harga = Number(hargaInput.value);
    if(!p || !jumlah || jumlah <= 0) return;
    const now = new Date();
    state.transactions.unshift({
      id: 't' + Date.now(),
      tanggal: TODAY,
      waktu: now.toTimeString().slice(0,5),
      jenis: p.jenis,
      jumlah: jumlah,
      harga: harga,
      total: jumlah * harga
    });
    saveData();
    jumlahInput.value = 1;
    updateSubtotal();
    renderAll();
  });

  function deleteTx(id){
    state.transactions = state.transactions.filter(t => t.id !== id);
    saveData();
    renderAll();
  }

  function renderTxList(){
    const todays = state.transactions.filter(t => t.tanggal === TODAY);
    document.getElementById('txCountLabel').textContent = `Transaksi Hari Ini (${todays.length})`;
    const el = document.getElementById('txList');
    if(todays.length === 0){
      el.innerHTML = '<p class="empty">Belum ada transaksi. Tambahkan di atas.</p>';
      return;
    }
    el.innerHTML = todays.map(t => `
      <div class="tx-item">
        <div>
          <div class="jenis">${t.jenis} <span class="meta" style="font-weight:400;">× ${t.jumlah}</span></div>
          <div class="meta">${t.waktu} · ${formatRp(t.harga)}/ekor</div>
        </div>
        <div class="right">
          <span class="total">${formatRp(t.total)}</span>
          <button class="del-btn" onclick="deleteTx('${t.id}')" aria-label="Hapus">✕</button>
        </div>
      </div>
    `).join('');
  }

  function renderHeaderTotal(){
    const todays = state.transactions.filter(t => t.tanggal === TODAY);
    const total = todays.reduce((s,t) => s + t.total, 0);
    document.getElementById('todayTotal').textContent = formatRp(total);
  }

  function renderClosingPanel(){
    const todays = state.transactions.filter(t => t.tanggal === TODAY);
    const ekor = todays.reduce((s,t) => s + t.jumlah, 0);
    const omzet = todays.reduce((s,t) => s + t.total, 0);
    document.getElementById('closingDate').textContent = 'Rekap ' + formatTanggalIndo(TODAY);
    document.getElementById('cJumlahTx').textContent = todays.length;
    document.getElementById('cEkor').textContent = ekor;
    document.getElementById('cOmzet').textContent = formatRp(omzet);
    const byJenis = {};
    todays.forEach(t => {
      if(!byJenis[t.jenis]) byJenis[t.jenis] = {ekor:0, omzet:0};
      byJenis[t.jenis].ekor += t.jumlah;
      byJenis[t.jenis].omzet += t.total;
    });
    const bd = document.getElementById('cBreakdown');
    bd.innerHTML = Object.entries(byJenis).map(([jenis,v]) =>
      `<div><span>${jenis}</span><span>${v.ekor} ekor · ${formatRp(v.omzet)}</span></div>`
    ).join('');
    document.getElementById('downloadTodayBtn').disabled = todays.length === 0;
  }

  document.getElementById('closingBtn').addEventListener('click', () => {
    const panel = document.getElementById('closingPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  function downloadCSV(dateStr){
    const rows = state.transactions.filter(t => t.tanggal === dateStr);
    if(rows.length === 0) return;

    const byJenis = {};
    rows.forEach(t => {
      if(!byJenis[t.jenis]) byJenis[t.jenis] = { jumlah:0, total:0 };
      byJenis[t.jenis].jumlah += t.jumlah;
      byJenis[t.jenis].total += t.total;
    });
    const totalEkor = rows.reduce((s,t) => s + t.jumlah, 0);
    const totalOmzet = rows.reduce((s,t) => s + t.total, 0);

    const itemRows = Object.entries(byJenis).map(([jenis, v]) => `
      <tr>
        <td class="c-jenis">${jenis}</td>
        <td class="c-jml">${v.jumlah}</td>
        <td class="c-total">${formatRp(v.total)}</td>
      </tr>`).join('');

    const detailRows = rows.map(t => `
      <tr class="detail-row">
        <td class="c-jam">${t.waktu}</td>
        <td class="c-jenis">${t.jenis}</td>
        <td class="c-jml">${t.jumlah}</td>
        <td class="c-total">${formatRp(t.total)}</td>
      </tr>`).join('');

    document.getElementById('strukBody').innerHTML = `
      <div class="center">
        <h1>KASIR AYAM POTONG</h1>
        <p class="sub">Rekap ${formatTanggalIndo(dateStr)}</p>
      </div>
      <div class="dashed"></div>
      <table>
        <thead>
          <tr>
            <th>Jenis Ayam</th>
            <th class="th-jml">Ekor</th>
            <th class="th-total">Total</th>
          </tr>
        </thead>
        <tbody>${itemRows}</tbody>
      </table>
      <div class="dashed"></div>
      <table>
        <tbody>
          <tr class="total-row">
            <td class="c-jenis">TOTAL (${rows.length} transaksi)</td>
            <td class="c-jml">${totalEkor}</td>
            <td class="c-total">${formatRp(totalOmzet)}</td>
          </tr>
        </tbody>
      </table>
      <div class="dashed"></div>
      <p class="sub" style="margin-bottom:4px;">Rincian per transaksi</p>
      <table>
        <tbody>${detailRows}</tbody>
      </table>
      <div class="footer center">
        <p>Dicetak ${new Date().toLocaleString('id-ID')}</p>
        <p>Terima kasih</p>
      </div>`;

    document.getElementById('strukOverlay').style.display = 'flex';
  }
  document.getElementById('downloadTodayBtn').addEventListener('click', () => downloadCSV(TODAY));
  document.getElementById('strukCloseBtn').addEventListener('click', () => {
    document.getElementById('strukOverlay').style.display = 'none';
  });
  document.getElementById('strukPrintBtn').addEventListener('click', () => window.print());



  function renderHistory(){
    const dates = Array.from(new Set(state.transactions.map(t => t.tanggal)))
      .filter(d => d !== TODAY)
      .sort((a,b) => a < b ? 1 : -1);
    document.getElementById('historyLabel').textContent = `Riwayat Hari Sebelumnya (${dates.length})`;
    const el = document.getElementById('historyPanel');
    if(dates.length === 0){
      el.innerHTML = '<p class="empty">Belum ada riwayat dari hari sebelumnya.</p>';
      return;
    }
    el.innerHTML = dates.map(d => {
      const rows = state.transactions.filter(t => t.tanggal === d);
      const total = rows.reduce((s,t)=>s+t.total,0);
      return `
        <div class="hist-item">
          <div>
            <div style="font-size:13px;">${formatTanggalIndo(d)}</div>
            <div class="meta">${rows.length} transaksi · ${formatRp(total)}</div>
          </div>
          <button class="dl" onclick="downloadCSV('${d}')" aria-label="Download">⬇</button>
        </div>
      `;
    }).join('');
  }

  document.getElementById('historyToggle').addEventListener('click', () => {
    const p = document.getElementById('historyPanel');
    const arrow = document.getElementById('historyArrow');
    const open = p.style.display !== 'none';
    p.style.display = open ? 'none' : 'block';
    arrow.textContent = open ? '▾' : '▴';
  });

  function renderPriceSettings(){
    const el = document.getElementById('priceRows');
    el.innerHTML = state.priceList.map(p => `
      <div class="price-row">
        <input type="text" value="${p.jenis}" onchange="updatePriceName('${p.id}', this.value)">
        <input type="number" value="${p.harga}" onchange="updatePriceValue('${p.id}', this.value)">
        <button class="del-btn" onclick="removePrice('${p.id}')" aria-label="Hapus">✕</button>
      </div>
    `).join('');
  }

  function updatePriceName(id, val){
    const p = state.priceList.find(x => x.id === id);
    if(p) p.jenis = val;
    saveData();
    renderAll();
  }
  function updatePriceValue(id, val){
    const p = state.priceList.find(x => x.id === id);
    if(p) p.harga = Number(val) || 0;
    saveData();
    renderAll();
  }
  function removePrice(id){
    state.priceList = state.priceList.filter(x => x.id !== id);
    saveData();
    renderAll();
  }
  document.getElementById('addPriceBtn').addEventListener('click', () => {
    state.priceList.push({ id: 'p' + Date.now(), jenis: 'Jenis Baru', harga: 0 });
    saveData();
    renderAll();
  });

  document.getElementById('settingsToggle').addEventListener('click', () => {
    const p = document.getElementById('settingsPanel');
    const arrow = document.getElementById('settingsArrow');
    const open = p.style.display !== 'none';
    p.style.display = open ? 'none' : 'block';
    arrow.textContent = open ? '▾' : '▴';
  });

  function renderAll(){
    const currentJenisId = jenisSelect.value;
    renderJenisSelect();
    if(currentJenisId && state.priceList.some(p => p.id === currentJenisId)){
      jenisSelect.value = currentJenisId;
      const p = state.priceList.find(x => x.id === currentJenisId);
      if(p) hargaInput.value = p.harga;
    }
    updateSubtotal();
    renderTxList();
    renderHeaderTotal();
    renderClosingPanel();
    renderHistory();
    renderPriceSettings();
  }

  renderAll();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW gagal:', err));
    });
  }
</script>

</body>
</html>
